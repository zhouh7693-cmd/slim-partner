<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>减肥搭子 · 邀你一起瘦</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #d0eaff 0%, #e8f5e9 60%, #fce4ec 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 24px 16px;
    }

    /* ========== 卡片主体 ========== */
    .card {
      width: 100%;
      max-width: 380px;
      background: white;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 32px 60px -16px rgba(58,124,165,0.25), 0 8px 24px -8px rgba(0,0,0,0.1);
      position: relative;
    }

    /* 顶部渐变横幅 */
    .card-banner {
      background: linear-gradient(135deg, #3a7ca5 0%, #5ab0d8 50%, #7ecff0 100%);
      padding: 36px 28px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card-banner::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
    }
    .card-banner::after {
      content: '';
      position: absolute; bottom: -30px; left: -20px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .banner-emoji { font-size: 56px; margin-bottom: 10px; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }
    .banner-title {
      font-size: 26px; font-weight: 800; color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      letter-spacing: 1px; margin-bottom: 6px;
    }
    .banner-sub { font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 400; }

    /* 卡片主内容 */
    .card-body { padding: 24px 24px 20px; }

    /* 特性列表 */
    .feature-list { margin-bottom: 20px; }
    .feature-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f4f7;
    }
    .feature-item:last-child { border-bottom: none; }
    .feature-icon {
      width: 36px; height: 36px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .fi-blue { background: #e8f4fd; }
    .fi-green { background: #e8f8ee; }
    .fi-orange { background: #fff4e5; }
    .fi-pink { background: #fdeef4; }
    .feature-text { flex: 1; }
    .feature-text strong { display: block; font-size: 14px; font-weight: 700; color: #1a2a3a; margin-bottom: 2px; }
    .feature-text span { font-size: 12px; color: #6c7a89; }

    /* 搭子预览 */
    .partner-preview {
      background: linear-gradient(135deg, #f0f7fd, #e8f5e9);
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .preview-label { font-size: 11px; color: #8f9eae; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.5px; text-transform: uppercase; }
    .partner-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: white; border-radius: 20px; padding: 5px 10px;
      font-size: 12px; font-weight: 500; color: #2b5a7a;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    /* CTA 按钮 */
    .cta-btn {
      display: block; width: 100%;
      background: linear-gradient(135deg, #3a7ca5, #2b5a7a);
      color: white; border: none; border-radius: 60px;
      padding: 16px; font-size: 17px; font-weight: 700;
      text-align: center; text-decoration: none;
      cursor: pointer;
      box-shadow: 0 10px 24px -6px rgba(58,124,165,0.45);
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .cta-btn:active { transform: scale(0.97); }

    /* 底部标注 */
    .card-footer {
      padding: 12px 24px 20px;
      text-align: center;
    }
    .card-footer p { font-size: 11px; color: #b0bec5; }

    /* 数据徽章 */
    .stats-row {
      display: flex; gap: 0;
      border-top: 1px solid #f0f4f7;
      border-bottom: 1px solid #f0f4f7;
      margin-bottom: 20px;
    }
    .stat-item { flex: 1; text-align: center; padding: 14px 8px; }
    .stat-item + .stat-item { border-left: 1px solid #f0f4f7; }
    .stat-num { font-size: 22px; font-weight: 800; color: #3a7ca5; }
    .stat-label { font-size: 11px; color: #8f9eae; margin-top: 2px; }
  </style>
</head>
<body>

<div class="card">

  <!-- 顶部横幅 -->
  <div class="card-banner" id="cardBanner">
    <div style="background:rgba(255,255,255,0.2);border-radius:12px;padding:6px 12px;display:inline-block;margin-bottom:8px;font-size:12px;color:rgba(255,255,255,0.9);" id="inviteBadge">👋 邀请你一起</div>
    <span class="banner-emoji" id="bannerEmoji">🏃‍♀️</span>
    <div class="banner-title" id="bannerTitle">减肥搭子来了</div>
    <div class="banner-sub" id="bannerSub">我在减肥，你来不来？</div>
  </div>

  <div class="card-body">

    <!-- 个人数据区（根据URL参数显示） -->
    <div id="personalStats" class="stats-row">
      <div class="stat-item">
        <div class="stat-num" id="statDays">-</div>
        <div class="stat-label">连续打卡</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statChange">-</div>
        <div class="stat-label">体重变化</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statPartner">-</div>
        <div class="stat-label">我的搭子</div>
      </div>
    </div>

    <!-- 引用语 -->
    <div style="background:#fffbf0;border-left:3px solid #ffb300;border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#5d4037;line-height:1.6;font-style:italic;" id="inviteQuote">
      "一个人减肥太孤独，找个搭子一起打卡互相监督！"
    </div>

    <!-- 特性 -->
    <div class="feature-list">
      <div class="feature-item">
        <div class="feature-icon fi-blue">🎭</div>
        <div class="feature-text">
          <strong>4种性格的搭子，任你选</strong>
          <span>温柔鼓励 / 热血激励 / 冷静理性 / 毒舌中肯</span>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon fi-green">✅</div>
        <div class="feature-text">
          <strong>每天打卡，搭子有回应</strong>
          <span>不只是记录，更是一个会说话的小伙伴</span>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon fi-orange">📊</div>
        <div class="feature-text">
          <strong>体重曲线 + SOP评分</strong>
          <span>趋势清晰，进度可视化</span>
        </div>
      </div>
    </div>

    <!-- 按钮 -->
    <a class="cta-btn" href="./index.html" id="ctaBtn">
      🚀 现在开始
    </a>

  </div>

  <div class="card-footer">
    <p>打开即用，无需注册 · 免费永久使用</p>
  </div>

  <script>
    // 从URL参数读取用户数据
    (function() {
      const params = new URLSearchParams(window.location.search);
      const days = params.get('days');
      const change = params.get('change');
      const partner = params.get('partner');
      if (days) document.getElementById('statDays').textContent = days + '天';
      if (change) document.getElementById('statChange').textContent = change;
      if (partner) document.getElementById('statPartner').textContent = decodeURIComponent(partner);
      if (days) {
        document.getElementById('bannerSub').textContent = '我已坚持' + days + '天，一起吗？';
        document.getElementById('inviteQuote').textContent = '"减肥搭子太有用了！已坚持' + days + '天，推荐你也试试～"';
      }
    })();
  </script>

</div>

</body>
</html>

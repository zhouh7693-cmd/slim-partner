<!DOCTYPE html>

<title>Slim Partner 导航</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f0ff;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 22px;
    color: #5b3fa6;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 13px;
    color: #999;
    margin-top: 6px;
  }
  .section-title {
    font-size: 12px;
    color: #aaa;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 24px 0 10px 4px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .card-grid.single {
    grid-template-columns: 1fr;
  }
  a.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    border-radius: 16px;
    padding: 18px 12px;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(91,63,166,0.08);
    transition: transform 0.15s, box-shadow 0.15s;
    min-height: 80px;
  }
  a.card:active {
    transform: scale(0.97);
    box-shadow: 0 1px 4px rgba(91,63,166,0.12);
  }
  .card-emoji {
    font-size: 28px;
    margin-bottom: 8px;
    line-height: 1;
  }
  .card-label {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    text-align: center;
  }
  .card-sub {
    font-size: 11px;
    color: #999;
    margin-top: 3px;
    text-align: center;
  }
  /* 主打卡卡片 —— 宽一点 */
  a.card.featured {
    grid-column: 1 / -1;
    flex-direction: row;
    padding: 18px 24px;
    background: linear-gradient(135deg, #7b5ea7, #a87edc);
    gap: 14px;
    min-height: 70px;
  }
  a.card.featured .card-emoji { font-size: 32px; margin-bottom: 0; }
  a.card.featured .card-label { color: #fff; font-size: 16px; }
  a.card.featured .card-sub { color: rgba(255,255,255,0.75); }
  /* 分享卡片 */
  a.card.share {
    background: linear-gradient(135deg, #ff9a3c, #ffcf70);
  }
  a.card.share .card-label { color: #fff; }
  a.card.share .card-sub { color: rgba(255,255,255,0.8); }
</style>
</head>
